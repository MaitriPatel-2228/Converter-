<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Converter</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<h1 style="align:center;">Welcome!!!!<h1>

  <div class="container">
    <h1>Unit Converter</h1>

    <label>Category</label>
    <select id="category" onchange="updateUnits()">
      <option value="length">Length</option>
      <option value="weight">Weight</option>
      <option value="time">Time</option>
    </select>

    <label>Enter Value</label>
    <input type="number" id="inputValue" placeholder="Enter number">

    <label>From</label>
    <select id="fromUnit"></select>

    <label>To</label>
    <select id="toUnit"></select>

    <button onclick="convert()">Convert</button>

    <div class="result" id="result">
      Result: 
    </div>
  </div>

  <script>
    const units = {
      length: {
        meter: 1,
        kilometer: 1000,
        centimeter: 0.01,
        mile: 1609.34
      },

      weight: {
        gram: 1,
        kilogram: 1000,
        pound: 453.592,
        ounce: 28.3495
      },

      time: {
        second: 1,
        minute: 60,
        hour: 3600,
        day: 86400
      }
    };

    function updateUnits() {
      const category = document.getElementById("category").value;
      const fromUnit = document.getElementById("fromUnit");
      const toUnit = document.getElementById("toUnit");

      fromUnit.innerHTML = "";
      toUnit.innerHTML = "";

      for (let unit in units[category]) {
        fromUnit.innerHTML += `<option value="${unit}">${unit}</option>`;
        toUnit.innerHTML += `<option value="${unit}">${unit}</option>`;
      }
    }

    function convert() {
      const category = document.getElementById("category").value;
      const inputValue = parseFloat(document.getElementById("inputValue").value);
      const fromUnit = document.getElementById("fromUnit").value;
      const toUnit = document.getElementById("toUnit").value;

      if (isNaN(inputValue)) {
        alert("Please enter a valid number");
        return;
      }

      const baseValue = inputValue * units[category][fromUnit];
      const convertedValue = baseValue / units[category][toUnit];

      document.getElementById("result").innerHTML =
        `Result: ${convertedValue.toFixed(4)} ${toUnit}`;
    }

    updateUnits();
  </script>

</body>
</html>
